services:
  postgres:
    image: postgres:16-alpine
    container_name: shorthand-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shorthand_user
      POSTGRES_PASSWORD: shorthand_password
      POSTGRES_DB: shorthand_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shorthand-network

  redis:
    image: redis:7.2-alpine
    container_name: shorthand-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shorthand-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shorthand-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - shorthand-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shorthand-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - shorthand-network

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:

networks:
  shorthand-network:
    driver: bridge