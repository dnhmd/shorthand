services:
  postgres:
    image: postgres:16-alpine
    container_name: shorthand-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shorthand_user
      POSTGRES_PASSWORD: shorthand_password
      POSTGRES_DB: shorthand_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shorthand-network

  redis:
    image: redis:7.2-alpine
    container_name: shorthand-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shorthand-network

volumes:
  postgres_data:
  redis_data:

networks:
  shorthand-network:
    driver: bridge